<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Lab5 Table</title>

    <script src="https://cdn.tailwindcss.com"></script>

</head>

<body class="bg-gray-100">

<div class="w-full bg-white border rounded">

    <!-- top panel -->
    <div class="flex justify-between items-center p-4 text-sm text-gray-600">
        <div>0 selected</div>

        <div class="space-x-6">
            <span class="cursor-pointer">Sort by</span>
            <span class="cursor-pointer">Actions</span>
        </div>
    </div>

    <table class="w-full text-sm">

        <thead class="bg-gray-50 border-t border-b">
        <tr>
            <th class="p-3 w-10"></th>
            <th class="text-left p-3">Name</th>
            <th class="text-left p-3">Properties</th>
            <th class="text-left p-3">Created by</th>
            <th class="text-left p-3">Last updated</th>
            <th class="p-3 w-10"></th>
        </tr>
        </thead>

        <tbody>

        <tr class="border-b hover:bg-gray-200">
            <td class="p-3"><input type="checkbox"></td>
            <td class="p-3">denver</td>
            <td class="p-3">24</td>
            <td class="p-3">Me</td>
            <td class="p-3">02/27/2026 1:41PM</td>
            <td class="p-3 text-right">⋮</td>
        </tr>

        <tr class="border-b hover:bg-gray-200">
            <td class="p-3"><input type="checkbox"></td>
            <td class="p-3">test save</td>
            <td class="p-3">10</td>
            <td class="p-3">Me</td>
            <td class="p-3">02/10/2026 5:52PM</td>
            <td class="p-3 text-right">⋮</td>
        </tr>

        <tr class="border-b hover:bg-gray-200">
            <td class="p-3"><input type="checkbox"></td>
            <td class="p-3">gggg</td>
            <td class="p-3">10</td>
            <td class="p-3">Me</td>
            <td class="p-3">02/04/2026 5:49PM</td>
            <td class="p-3 text-right">⋮</td>
        </tr>

        <tr class="border-b hover:bg-gray-200">
            <td class="p-3"><input type="checkbox"></td>
            <td class="p-3">test full export</td>
            <td class="p-3">4059</td>
            <td class="p-3">Me</td>
            <td class="p-3">02/02/2026 11:19AM</td>
            <td class="p-3 text-right">⋮</td>
        </tr>

        <tr class="hover:bg-gray-200">
            <td class="p-3"><input type="checkbox"></td>
            <td class="p-3">denver 1</td>
            <td class="p-3">14</td>
            <td class="p-3">Me</td>
            <td class="p-3">01/23/2026 9:20AM</td>
            <td class="p-3 text-right">⋮</td>
        </tr>

        </tbody>

    </table>

    <!-- bottom panel -->
    <div class="flex justify-between items-center p-4 text-sm text-gray-600 border-t">
        <div>
            Show <span class="border px-2 py-1">5</span> of 5 results
        </div>

        <div class="border px-3 py-1 rounded text-green-600">
            1
        </div>
    </div>

</div>

</body>
</html>
